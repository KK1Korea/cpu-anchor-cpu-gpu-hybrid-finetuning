### 🪼 Project Jellyfish — 실험 A: GPU-only (베이스라인)
### Qwen2.5-7B-Instruct QLoRA 4-bit, 500 steps

### model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### dataset
dataset: alpaca_en
template: qwen
cutoff_len: 512

### output
output_dir: saves/jellyfish_exp_a
logging_steps: 10
save_steps: 100
save_total_limit: 2

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
max_steps: 500
lr_scheduler_type: cosine
warmup_steps: 30
bf16: true
seed: 42

### quantization (QLoRA)
quantization_bit: 4
quantization_method: bitsandbytes

### windows fix
dataloader_num_workers: 0

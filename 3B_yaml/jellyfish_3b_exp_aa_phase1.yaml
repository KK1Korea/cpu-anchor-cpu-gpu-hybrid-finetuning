### model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### dataset
dataset: alpaca_en
template: qwen
cutoff_len: 512
preprocessing_num_workers: 16

### output
output_dir: saves/jellyfish_3b_anchor_aa
logging_steps: 10
save_steps: 100
overwrite_output_dir: true
save_total_limit: 5

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
max_steps: 500
lr_scheduler_type: cosine
warmup_steps: 30
pure_bf16: false
fp16: false
bf16: false
seed: 5108

### precision — GPU fp32
### Phase1: run 100 steps then manually stop (Ctrl+C)
### save_steps=100 ensures checkpoint-100 is saved
### max_steps=500 so cosine schedule spans full 500 steps

### model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### dataset
dataset: alpaca_en
template: qwen
cutoff_len: 512
preprocessing_num_workers: 16

### output
output_dir: saves/jellyfish_3b_exp_aa
logging_steps: 10
save_steps: 500
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
max_steps: 500
lr_scheduler_type: cosine
warmup_steps: 30
pure_bf16: true
bf16: true
seed: 5108
resume_from_checkpoint: saves/jellyfish_3b_anchor_aa/checkpoint-100

### precision — GPU bf16
### Phase2: resumes from Phase1 checkpoint-100
### Same 500-step cosine schedule, lr continues naturally from step 100 position
### Only change: precision fp32 -> bf16

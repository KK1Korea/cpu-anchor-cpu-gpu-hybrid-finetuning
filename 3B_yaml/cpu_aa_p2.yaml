### Project Jellyfish - 3B Exp CPU-AA Phase2: GPU bf16 (resume from CPU anchor)
### Resumes from CPU fp32 checkpoint-100 with continuous 500-step cosine
### Only change from Phase1: device (CPU to GPU) + precision (fp32 to bf16)

### model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### dataset
dataset: alpaca_en
template: qwen
cutoff_len: 512
preprocessing_num_workers: 16

### output
output_dir: saves/jellyfish_3b_exp_cpu_aa
logging_steps: 10
save_steps: 500
overwrite_output_dir: true

### train - GPU bf16
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
max_steps: 500
lr_scheduler_type: cosine
warmup_steps: 30
pure_bf16: true
bf16: true
seed: 5108
resume_from_checkpoint: saves/jellyfish_3b_anchor_cpu_aa/checkpoint-100

### windows fix
dataloader_num_workers: 0

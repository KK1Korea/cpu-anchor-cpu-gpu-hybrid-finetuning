### Project Jellyfish 🪼 — 3B Exp A Phase 2: GPU bf16 (80%)
### Branch: 3b-full-precision
### Purpose: bf16 exploration from fp32 anchor checkpoint
### Resume from Phase1 fp32 anchor → switch to bf16

### Model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: alpaca_en
template: qwen
cutoff_len: 512

### Resume from fp32 anchor checkpoint
resume_from_checkpoint: saves/jellyfish_3b_anchor_a/checkpoint-100

### Training — GPU bf16 exploration phase
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
max_steps: 500
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_steps: 30
seed: 5108

### Precision — bf16
bf16: true

### Logging
logging_steps: 10
save_steps: 100
save_total_limit: 2

### Output — Exp A results (separate from anchor folder)
output_dir: saves/jellyfish_3b_exp_a
overwrite_output_dir: false
